<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClubLots — Set Admin</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, sans-serif; background:#0f0f1e; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { max-width:420px; width:100%; background:#1a1a2e; border:1px solid rgba(255,215,0,0.2); border-radius:20px; padding:28px; }
  h1 { font-size:18px; color:#ffd700; margin-bottom:4px; }
  .sub { font-size:12px; color:#888; margin-bottom:20px; }
  .field { margin-bottom:14px; }
  label { font-size:11px; color:#aaa; display:block; margin-bottom:4px; }
  .addr { font-size:11px; color:#67e8f9; background:rgba(255,255,255,0.05); padding:10px 12px; border-radius:10px; word-break:break-all; font-family:monospace; border:1px solid rgba(255,255,255,0.08); }
  .status { padding:12px; border-radius:12px; font-size:12px; margin-top:16px; text-align:center; line-height:1.5; }
  .status.info { background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); color:#93c5fd; }
  .status.ok { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.2); color:#6ee7b7; }
  .status.err { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#fca5a5; }
  .status.warn { background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.2); color:#fcd34d; }
  button { width:100%; padding:14px; border:none; border-radius:14px; font-size:14px; font-weight:800; cursor:pointer; margin-top:16px; transition:all 0.2s; }
  .btn-connect { background:rgba(255,215,0,0.15); color:#ffd700; border:1px solid rgba(255,215,0,0.3); }
  .btn-connect:hover { background:rgba(255,215,0,0.25); }
  .btn-send { background:linear-gradient(135deg,#ffd700,#f59e0b); color:#000; }
  .btn-send:hover { filter:brightness(1.1); }
  .btn-send:disabled { opacity:0.4; cursor:not-allowed; }
  .connected { font-size:11px; color:#6ee7b7; margin-top:8px; text-align:center; }
  .step { display:flex; align-items:center; gap:8px; margin-bottom:12px; padding:10px; border-radius:10px; background:rgba(255,255,255,0.03); }
  .step-num { width:24px; height:24px; border-radius:50%; background:rgba(255,215,0,0.2); color:#ffd700; font-size:11px; font-weight:bold; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .step-text { font-size:11px; color:#ccc; }
</style>
</head>
<body>
<div class="card">
  <h1>🔐 ClubLots — Добавить админа</h1>
  <p class="sub">Вызов setAdmin на контракте ClubLots (opBNB)</p>

  <div class="step">
    <div class="step-num">1</div>
    <div class="step-text">Подключи кошелёк <b>0x2dac...b5cE</b> (deployer/owner)</div>
  </div>
  <div class="step">
    <div class="step-num">2</div>
    <div class="step-text">Нажми "Добавить админа" → подпиши транзакцию</div>
  </div>

  <div class="field">
    <label>Контракт ClubLots:</label>
    <div class="addr">0x7eeBe30dF390fCE3166aD1Cb55935aa5bEe2871A</div>
  </div>

  <div class="field">
    <label>Новый админ (0x7bcd...84c8):</label>
    <div class="addr">0x7bcd1753868895971e12448412cb3216d47884c8</div>
  </div>

  <div id="walletSection">
    <button class="btn-connect" onclick="connectWallet()">🔗 Подключить кошелёк</button>
  </div>

  <div id="statusBox" class="status info" style="display:none;"></div>
</div>

<script>
const CLUBLOTS = '0x7eeBe30dF390fCE3166aD1Cb55935aa5bEe2871A'
const NEW_ADMIN = '0x7bcd1753868895971e12448412cb3216d47884c8'
const DEPLOYER = '0x2dac0b8bf4846ccc44258a23acb4f2b1dd6db5ce'.toLowerCase()

// setAdmin(address,bool) selector = 0x4b0bddd2
const SET_ADMIN_SELECTOR = '0x4b0bddd2'

let connectedAddr = null

function show(msg, type) {
  const el = document.getElementById('statusBox')
  el.style.display = 'block'
  el.className = 'status ' + type
  el.innerHTML = msg
}

async function connectWallet() {
  if (!window.ethereum) {
    show('❌ Кошелёк не найден. Откройте в SafePal Browser.', 'err')
    return
  }
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' })
    connectedAddr = accounts[0].toLowerCase()

    // Проверяем сеть
    const chainId = await window.ethereum.request({ method: 'eth_chainId' })
    if (chainId !== '0xcc') {
      show('⚠️ Переключитесь на opBNB (chainId 204)', 'warn')
      try {
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: '0xcc' }]
        })
      } catch(e) {
        await window.ethereum.request({
          method: 'wallet_addEthereumChain',
          params: [{
            chainId: '0xcc',
            chainName: 'opBNB Mainnet',
            rpcUrls: ['https://opbnb-mainnet-rpc.bnbchain.org'],
            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
            blockExplorerUrls: ['https://opbnb.bscscan.com']
          }]
        })
      }
    }

    if (connectedAddr !== DEPLOYER) {
      show(`⚠️ Подключён: ${connectedAddr.slice(0,6)}...${connectedAddr.slice(-4)}<br>Нужен deployer: 0x2dac...b5cE<br>Переключи кошелёк в SafePal!`, 'warn')
      document.getElementById('walletSection').innerHTML = `
        <div class="connected">🔗 ${connectedAddr.slice(0,6)}...${connectedAddr.slice(-4)} (не deployer!)</div>
        <button class="btn-connect" onclick="connectWallet()">🔄 Переключить</button>
      `
      return
    }

    show(`✅ Подключён deployer: ${connectedAddr.slice(0,6)}...${connectedAddr.slice(-4)}`, 'ok')
    document.getElementById('walletSection').innerHTML = `
      <div class="connected">✅ ${connectedAddr.slice(0,6)}...${connectedAddr.slice(-4)} (deployer)</div>
      <button class="btn-send" onclick="callSetAdmin()">⚡ Добавить 0x7bcd как админа</button>
    `
  } catch(e) {
    show('❌ ' + (e.message || 'Ошибка подключения'), 'err')
  }
}

async function callSetAdmin() {
  if (!connectedAddr) return show('Сначала подключите кошелёк', 'warn')

  const btn = document.querySelector('.btn-send')
  btn.disabled = true
  btn.textContent = '⏳ Подписываем...'
  show('⏳ Отправляем транзакцию setAdmin...', 'info')

  try {
    // Encode: setAdmin(0x7bcd..., true)
    // address padded to 32 bytes + bool true padded to 32 bytes
    const addrPadded = NEW_ADMIN.slice(2).toLowerCase().padStart(64, '0')
    const truePadded = '1'.padStart(64, '0')
    const data = SET_ADMIN_SELECTOR + addrPadded + truePadded

    const txHash = await window.ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: connectedAddr,
        to: CLUBLOTS,
        data: data,
        gas: '0x30000', // 196608
      }]
    })

    show(`✅ Транзакция отправлена!<br><a href="https://opbnb.bscscan.com/tx/${txHash}" target="_blank" style="color:#67e8f9;">Открыть в Explorer →</a><br><br>Теперь 0x7bcd — админ контракта ClubLots.<br>Переходи к шагу 2: добавь запись в Supabase dc_admins.`, 'ok')
    btn.textContent = '✅ Готово!'
  } catch(e) {
    show('❌ ' + (e.message || e.reason || 'Транзакция отклонена'), 'err')
    btn.disabled = false
    btn.textContent = '⚡ Добавить 0x7bcd как админа'
  }
}
</script>
</body>
</html>
